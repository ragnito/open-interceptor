name: release

# Build release binaries for macOS and Linux and attach them to the GitHub
# Release for the pushed tag. The `install.sh` script downloads these assets.
#
# Asset naming (consumed by install.sh — keep in sync):
#   open-interceptor-<target>.tar.gz
#   open-interceptor-<target>.tar.gz.sha256
#
# Targets:
#   aarch64-apple-darwin        (Apple Silicon macOS)
#   x86_64-apple-darwin         (Intel macOS)
#   aarch64-unknown-linux-musl  (ARM64 Linux, static)
#   x86_64-unknown-linux-musl   (x86_64 Linux, static)
#
# musl is used for Linux so the binaries are fully static and run on any
# distro without a glibc-version dependency. The crate already uses
# rustls-tls (no OpenSSL), so there is no system TLS dependency to link.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Creates the GitHub Release for the pushed tag if it does not yet
      # exist. Idempotent: re-running with an existing release is a no-op.
      # The `upload-assets` matrix depends on this job so it can attach
      # binaries to the release.
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Builds the `open-interceptor` binary for the target, strips it,
      # creates `open-interceptor-<target>.tar.gz` + a `.sha256` checksum, and
      # uploads both to the release matching the pushed tag. Cross-compilation
      # toolchains (incl. musl) are handled automatically.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: open-interceptor
          target: ${{ matrix.target }}
          archive: open-interceptor-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
