<?xml version="1.0" encoding="UTF-8"?>
<!-- open-interceptor app icon — thick white upward arrow.
     To regenerate icon-1024.png from this SVG:
       rsvg-convert -w 1024 -h 1024 icon.svg -o icon-1024.png
     Then run tools/make-icons.sh -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="#1a1a2e"/>

  <!-- Thick white upward arrow (shaft + arrowhead as a single polygon) -->
  <polygon points="
    512,130
    790,480
    620,480
    620,894
    404,894
    404,480
    234,480
  " fill="#ffffff"/>
</svg>
